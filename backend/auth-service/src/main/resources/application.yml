spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5432/astra
    username: astra
    password: astra_dev_password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

  data:
    redis:
      host: redis
      port: 6379

  cache:
    type: redis

server:
  port: 8083
  shutdown: graceful

logging:
  level:
    root: INFO
    "[com.astra]": DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,metrics

auth:
  jwt:
    secret: ${JWT_SECRET:astra-gateway-dev-secret-key-minimum-256-bits-long-change-in-production}
    expiration-ms: 86400000
