spring:
  application:
    name: auth-service
  server:
    port: 8083

  datasource:
    url: jdbc:postgresql://postgres:5432/astra
    username: astra
    password: astra_dev_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate

  data:
    redis:
      host: redis
      port: 6379

  cache:
    type: redis

logging:
  level:
    root: INFO
    com.astra: DEBUG

app:
  jwt:
    secret: ${JWT_SECRET:astra-gateway-dev-secret-key-minimum-256-bits-long-change-in-production}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
