spring:
  application:
    name: gateway-service

  datasource:
    url: jdbc:postgresql://postgres:5432/astra
    username: astra
    password: astra_dev_password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

  data:
    redis:
      host: redis
      port: 6379
      timeout: 2000
      jedis:
        pool:
          max-active: 100
          max-idle: 50
          min-idle: 10

  cache:
    type: redis
    redis:
      time-to-live: 300000

server:
  port: 8080
  shutdown: graceful
  servlet:
    context-path: /
  compression:
    enabled: true
    min-response-size: 1024
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    root: INFO
    "[com.astra]": DEBUG
    org.springframework: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        gateway.request.duration: true

providers:
  anthropic:
    base-url: https://api.anthropic.com
    api-key: ${ANTHROPIC_API_KEY:}
  openai:
    base-url: https://api.openai.com
    api-key: ${OPENAI_API_KEY:}

services:
  observability:
    url: ${OBSERVABILITY_URL:http://observability-service:8086}
  routing:
    url: ${ROUTING_URL:http://routing-engine:8084}
    timeout-ms: 500
  auth:
    url: ${AUTH_URL:http://auth-service:8083}
    timeout-ms: 1000
    enabled: ${AUTH_ENABLED:true}
