spring:
  application:
    name: a2a-service
  server:
    port: 8082

  datasource:
    url: jdbc:postgresql://postgres:5432/astra
    username: astra
    password: astra_dev_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate

  data:
    redis:
      host: redis
      port: 6379

  kafka:
    bootstrap-servers: kafka:29092
    producer:
      acks: all
    consumer:
      group-id: a2a-service

logging:
  level:
    root: INFO
    com.astra: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,metrics

server:
  port: 8082
  shutdown: graceful
