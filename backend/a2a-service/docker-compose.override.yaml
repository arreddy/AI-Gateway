version: '3.9'

services:
  a2a-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: astra-a2a
    environment:
      A2A_PORT: "8082"
      A2A_GRPC_PORT: "50051"
      A2A_ENV: development
      A2A_DB_HOST: postgres
      A2A_DB_PORT: "5432"
      A2A_DB_NAME: astra
      A2A_DB_USER: astra
      A2A_DB_PASSWORD: astra_dev_password
      A2A_KAFKA_BROKERS: kafka:29092
      A2A_REDIS_URL: redis:6379
      A2A_TLS_ENABLED: "false"
      A2A_JAEGER_ENABLED: "true"
      A2A_JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      A2A_MESSAGE_TIMEOUT: 30s
      A2A_HEALTH_CHECK_INTERVAL_SECS: "10"
      A2A_AGENT_TTL: 5m
    ports:
      - "8082:8082"
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - astra-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./config/agents.yaml:/etc/a2a/agents.yaml
