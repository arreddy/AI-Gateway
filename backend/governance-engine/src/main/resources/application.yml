spring:
  application:
    name: governance-engine

  datasource:
    url: jdbc:postgresql://postgres:5432/astra
    username: astra
    password: astra_dev_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

server:
  port: 8085
  shutdown: graceful

logging:
  level:
    root: INFO
    "[com.astra]": DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
