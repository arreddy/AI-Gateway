spring:
  application:
    name: governance-engine
  server:
    port: 8085

  datasource:
    url: jdbc:postgresql://postgres:5432/astra
    username: astra
    password: astra_dev_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate

  kafka:
    bootstrap-servers: kafka:29092
    consumer:
      group-id: governance-engine

logging:
  level:
    root: INFO
    com.astra: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
