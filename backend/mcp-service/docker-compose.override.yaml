version: '3.8'

services:
  # MCP Service - Model Context Protocol Integration
  mcp-service:
    image: astra-gateway/mcp-service:latest
    build:
      context: .
      dockerfile: backend/mcp-service/Dockerfile
    container_name: astra-mcp-service
    hostname: mcp-service
    
    # Ports
    ports:
      - "50055:50055"  # gRPC server
      - "8055:8055"    # HTTP API
      - "9055:9055"    # Metrics (Prometheus)
    
    # Environment Variables
    environment:
      # Service Configuration
      SERVICE_NAME: mcp-service
      SERVICE_PORT: 50055
      HTTP_PORT: 8055
      METRICS_PORT: 9055
      ENVIRONMENT: development
      LOG_LEVEL: info
      
      # Discovery Configuration
      MCP_DISCOVERY_ENABLED: "true"
      MCP_DISCOVERY_POLLING_INTERVAL: 60s
      MCP_HEALTH_CHECK_TIMEOUT: 10s
      MCP_MAX_CONCURRENT_CHECKS: 5
      
      # Cache Configuration
      MCP_CACHE_ENABLED: "true"
      MCP_CACHE_TTL: 5m
      MCP_CACHE_MAX_SIZE: "10000"
      
      # Security
      API_KEY_SCOPING_ENABLED: "true"
      DEFAULT_RATE_LIMIT_RPM: "1000"
      DEFAULT_TIMEOUT_SECONDS: "30"
      
      # Observability
      OBSERVABILITY_HOST: observability-service
      OBSERVABILITY_PORT: 50052
      
      # Auth Service
      AUTH_SERVICE_HOST: auth-service
      AUTH_SERVICE_PORT: 50053
      
      # Gateway Service
      GATEWAY_SERVICE_HOST: gateway-service
      GATEWAY_SERVICE_PORT: 50051
    
    # Volumes
    volumes:
      - ./backend/mcp-service/config:/etc/mcp-service
      - ./backend/mcp-service/logs:/var/log/mcp-service
    
    # Health Check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8055/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Dependencies
    depends_on:
      postgres:
        condition: service_healthy
      observability-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    
    # Networking
    networks:
      - astra-network
    
    # Resource Limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    
    # Restart Policy
    restart: unless-stopped
    
    # Logging
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # MCP Example Server 1: Weather Tool (HTTP + SSE)
  weather-tool-server:
    image: astra-gateway/weather-tool:latest
    container_name: weather-tool
    hostname: weather-tool
    
    ports:
      - "3001:3001"
    
    environment:
      PORT: 3001
      LOG_LEVEL: info
      WEATHER_API_KEY: "${WEATHER_API_KEY}"
    
    depends_on:
      - mcp-service
    
    networks:
      - astra-network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    
    restart: unless-stopped

  # MCP Example Server 2: Database Tool (stdio)
  database-tool-server:
    image: astra-gateway/database-tool:latest
    container_name: database-tool
    
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: astra_db
      LOG_LEVEL: info
    
    depends_on:
      postgres:
        condition: service_healthy
      mcp-service:
        condition: service_healthy
    
    networks:
      - astra-network
    
    restart: unless-stopped

  # MCP Example Server 3: File System Tool (HTTP)
  filesystem-tool-server:
    image: astra-gateway/filesystem-tool:latest
    container_name: filesystem-tool
    hostname: filesystem-tool
    
    ports:
      - "3002:3002"
    
    environment:
      PORT: 3002
      LOG_LEVEL: info
      FS_ROOT_PATH: /data
      API_KEY: "${FS_API_KEY}"
    
    volumes:
      - ./data:/data
    
    depends_on:
      - mcp-service
    
    networks:
      - astra-network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    
    restart: unless-stopped

networks:
  astra-network:
    driver: bridge

# Usage:
# 1. Build the image:
#    docker-compose -f docker-compose.dev.yaml build mcp-service
#
# 2. Start the service:
#    docker-compose -f docker-compose.dev.yaml up -d mcp-service
#
# 3. Check logs:
#    docker-compose -f docker-compose.dev.yaml logs -f mcp-service
#
# 4. Stop the service:
#    docker-compose -f docker-compose.dev.yaml down
#
# 5. Test the service:
#    curl -X GET http://localhost:8055/v1/servers
#    curl -X GET http://localhost:8055/v1/tools/list
