spring:
  application:
    name: mcp-service
  server:
    port: 8081

  datasource:
    url: jdbc:postgresql://postgres:5432/astra
    username: astra
    password: astra_dev_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate

logging:
  level:
    root: INFO
    com.astra: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
