# MCP Servers Configuration
# This file defines the MCP servers that should be discovered and registered with the gateway

servers:
  # Example: Weather Tool Server (HTTP + SSE)
  - name: "weather-tool"
    type: "http"
    endpoint: "http://localhost:3001"
    transport: "sse"
    capabilities:
      - "weather:read"
      - "location:search"
    health_check_path: "/health"
    health_check_interval: 30s
    timeout: 30s
    max_retries: 3
    tags:
      category: "data"
      vendor: "weather-api"

  # Example: Database Query Tool (stdio)
  - name: "database-tool"
    type: "stdio"
    command: "python /opt/tools/db-connector.py"
    transport: "stdio"
    capabilities:
      - "database:query"
      - "database:write"
      - "database:transaction"
    timeout: 60s
    max_retries: 2
    environment:
      DB_HOST: "${DB_HOST}"
      DB_PORT: "${DB_PORT}"
      DB_USER: "${DB_USER}"
      DB_PASSWORD: "${DB_PASSWORD}"
      DB_NAME: "${DB_NAME}"
    tags:
      category: "data"
      vendor: "postgresql"

  # Example: File System Tool (HTTP)
  - name: "filesystem-tool"
    type: "http"
    endpoint: "http://localhost:3002"
    transport: "sse"
    capabilities:
      - "filesystem:read"
      - "filesystem:write"
      - "filesystem:list"
    health_check_path: "/health"
    health_check_interval: 30s
    timeout: 30s
    authentication:
      type: "bearer"
      token: "${FS_API_KEY}"
    tags:
      category: "data"
      vendor: "local"

  # Example: Web Search Tool (HTTP)
  - name: "web-search-tool"
    type: "http"
    endpoint: "http://localhost:3003"
    transport: "sse"
    capabilities:
      - "search:web"
      - "search:news"
    health_check_path: "/health"
    health_check_interval: 30s
    timeout: 15s
    authentication:
      type: "api_key"
      key: "X-API-Key"
      token: "${SEARCH_API_KEY}"
    tags:
      category: "external"
      vendor: "search-provider"

  # Example: Email Tool (stdio)
  - name: "email-tool"
    type: "stdio"
    command: "node /opt/tools/email-service.js"
    transport: "stdio"
    capabilities:
      - "email:send"
      - "email:verify"
    timeout: 30s
    environment:
      SMTP_HOST: "${SMTP_HOST}"
      SMTP_PORT: "${SMTP_PORT}"
      SMTP_USER: "${SMTP_USER}"
      SMTP_PASSWORD: "${SMTP_PASSWORD}"
      FROM_ADDRESS: "${FROM_ADDRESS}"
    tags:
      category: "communication"
      vendor: "smtp"

  # Example: Analytics Tool (HTTP)
  - name: "analytics-tool"
    type: "http"
    endpoint: "http://localhost:3004"
    transport: "sse"
    capabilities:
      - "analytics:query"
      - "analytics:aggregate"
    health_check_path: "/health"
    health_check_interval: 60s
    timeout: 45s
    authentication:
      type: "bearer"
      token: "${ANALYTICS_API_KEY}"
    tags:
      category: "analytics"
      vendor: "internal"

# Discovery Configuration
discovery:
  enabled: true
  polling_interval: 60s
  health_check_path: "/health"
  health_check_timeout: 10s
  max_concurrent: 5

# Cache Configuration
cache:
  enabled: true
  ttl: 5m
  max_size: 10000
  cleanup_interval: 1m

# Metrics Configuration
metrics:
  enabled: true
  prometheus_port: 9090
  track_tool_execution: true
  track_server_health: true

# Security Configuration
security:
  # API key scoping - tools can be scoped to specific API keys
  api_key_scoping_enabled: true
  
  # Rate limiting per tool
  rate_limiting:
    enabled: true
    default_rpm: 1000  # Requests per minute
    default_tpm: 100000  # Tokens per minute
  
  # Input validation
  input_validation_enabled: true
  
  # Timeout protection
  default_timeout: 30s
  max_timeout: 300s
  
  # Resource limits
  resource_limits:
    max_memory_mb: 512
    max_cpu_percent: 80

# Logging Configuration
logging:
  level: "info"
  format: "json"
  output: "stdout"
  fields:
    environment: "${ENVIRONMENT}"
    region: "${REGION}"
    service_version: "${SERVICE_VERSION}"

# Integration Configuration
integration:
  # Gateway service configuration
  gateway:
    enabled: true
    host: "gateway-service"
    port: 50051
    protocol: "grpc"
  
  # Observability service
  observability:
    enabled: true
    host: "observability-service"
    port: 50052
    protocol: "grpc"
  
  # Auth service
  auth:
    enabled: true
    host: "auth-service"
    port: 50053
    protocol: "grpc"
