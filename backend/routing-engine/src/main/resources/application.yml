spring:
  application:
    name: routing-engine

  datasource:
    url: jdbc:postgresql://postgres:5432/astra
    username: astra
    password: astra_dev_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

  data:
    redis:
      host: redis
      port: 6379

server:
  port: 8084
  shutdown: graceful

logging:
  level:
    root: INFO
    "[com.astra]": DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
