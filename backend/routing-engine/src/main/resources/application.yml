spring:
  application:
    name: routing-engine
  server:
    port: 8084

  datasource:
    url: jdbc:postgresql://postgres:5432/astra
    username: astra
    password: astra_dev_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate

  data:
    redis:
      host: redis
      port: 6379

  kafka:
    bootstrap-servers: kafka:29092
    consumer:
      group-id: routing-engine

logging:
  level:
    root: INFO
    com.astra: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
