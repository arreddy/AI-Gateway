global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: gateway-service
    static_configs:
      - targets: ["gateway-service:8080"]
    metrics_path: /actuator/prometheus

  - job_name: auth-service
    static_configs:
      - targets: ["auth-service:8083"]
    metrics_path: /actuator/prometheus

  - job_name: routing-engine
    static_configs:
      - targets: ["routing-engine:8084"]
    metrics_path: /actuator/prometheus

  - job_name: governance-engine
    static_configs:
      - targets: ["governance-engine:8085"]
    metrics_path: /actuator/prometheus

  - job_name: observability-service
    static_configs:
      - targets: ["observability-service:8086"]
    metrics_path: /actuator/prometheus
