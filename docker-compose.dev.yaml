# Astra Gateway — Development Stack
# Usage:
#   docker compose -f docker-compose.dev.yaml build
#   docker compose -f docker-compose.dev.yaml up -d
#   docker compose -f docker-compose.dev.yaml logs -f <service>
#   docker compose -f docker-compose.dev.yaml down -v

services:

  # ============================================================================
  # INFRASTRUCTURE
  # ============================================================================

  postgres:
    image: postgres:16-alpine
    container_name: astra-postgres
    environment:
      POSTGRES_DB: astra
      POSTGRES_USER: astra
      POSTGRES_PASSWORD: astra_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    command: ["postgres", "-c", "max_connections=200", "-c", "shared_buffers=256MB"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astra"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - astra-net

  redis:
    image: redis:7-alpine
    container_name: astra-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru", "--save", "900 1"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - astra-net

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: astra-clickhouse
    # No CLICKHOUSE_DB / CLICKHOUSE_USER env vars — they trigger the double-start
    # pre-init phase which causes port conflicts on macOS Docker Desktop.
    # Database and schema are created by the clickhouse-init service below.
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      # No init scripts here — avoids the double-start port conflict on macOS Docker Desktop.
      # Schema is applied by the clickhouse-init service below once ClickHouse is healthy.
      - ./infra/clickhouse/config.d/listen.xml:/etc/clickhouse-server/config.d/listen.xml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - astra-net
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # Applies the ClickHouse schema once the server is healthy, then exits.
  clickhouse-init:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: astra-clickhouse-init
    entrypoint: >
      sh -c "
        clickhouse-client --host clickhouse --port 9000 --query 'CREATE DATABASE IF NOT EXISTS astra' &&
        clickhouse-client --host clickhouse --port 9000 --database astra --multiquery < /clickhouse-schema.sql &&
        echo 'ClickHouse schema applied successfully'
      "
    volumes:
      - ./database/clickhouse-schema.sql:/clickhouse-schema.sql:ro
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - astra-net
    restart: on-failure

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: astra-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - astra-net

  grafana:
    image: grafana/grafana:11.0.0
    container_name: astra-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: astra_dev
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - clickhouse
    networks:
      - astra-net

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: astra-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
    networks:
      - astra-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:14269/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # APPLICATION SERVICES  (build context = ./backend, dockerfile per-module)
  # ============================================================================

  gateway-service:
    build:
      context: ./backend
      dockerfile: gateway-service/Dockerfile
    container_name: astra-gateway
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/astra
      SPRING_DATASOURCE_USERNAME: astra
      SPRING_DATASOURCE_PASSWORD: astra_dev_password
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-astra-gateway-dev-secret-key-minimum-256-bits-long}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      AUTH_URL: http://auth-service:8083
      ROUTING_URL: http://routing-engine:8084
      OBSERVABILITY_URL: http://observability-service:8086
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - astra-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

  auth-service:
    build:
      context: ./backend
      dockerfile: auth-service/Dockerfile
    container_name: astra-auth
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/astra
      SPRING_DATASOURCE_USERNAME: astra
      SPRING_DATASOURCE_PASSWORD: astra_dev_password
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-astra-gateway-dev-secret-key-minimum-256-bits-long}
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - astra-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/v1/auth/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

  routing-engine:
    build:
      context: ./backend
      dockerfile: routing-engine/Dockerfile
    container_name: astra-routing
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/astra
      SPRING_DATASOURCE_USERNAME: astra
      SPRING_DATASOURCE_PASSWORD: astra_dev_password
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - astra-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/v1/routing/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

  governance-engine:
    build:
      context: ./backend
      dockerfile: governance-engine/Dockerfile
    container_name: astra-governance
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/astra
      SPRING_DATASOURCE_USERNAME: astra
      SPRING_DATASOURCE_PASSWORD: astra_dev_password
    ports:
      - "8085:8085"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - astra-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/v1/governance/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

  observability-service:
    build:
      context: ./backend
      dockerfile: observability-service/Dockerfile
    container_name: astra-observability
    environment:
      CLICKHOUSE_URL: http://clickhouse:8123
    ports:
      - "8086:8086"
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - astra-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/v1/observability/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

  portal:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: astra-portal
    environment:
      # Rewrites go to service names on the Docker network
      GATEWAY_URL: http://gateway-service:8080
      AUTH_URL: http://auth-service:8083
      ROUTING_URL: http://routing-engine:8084
      GOVERNANCE_URL: http://governance-engine:8085
      OBSERVABILITY_URL: http://observability-service:8086
    ports:
      - "3001:3001"
    depends_on:
      - gateway-service
      - auth-service
    networks:
      - astra-net
    restart: on-failure

volumes:
  postgres_data:
  redis_data:
  clickhouse_data:
  prometheus_data:
  grafana_data:

networks:
  astra-net:
    driver: bridge
