apiVersion: v1
kind: Namespace
metadata:
  name: astra
  labels:
    name: astra

---
# Network Policy - Deny all ingress by default, allow specific traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: astra-default-deny
  namespace: astra
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# Allow ingress to gateway from external
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: astra-gateway-allow
  namespace: astra
spec:
  podSelector:
    matchLabels:
      app: gateway-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8080

---
# Allow inter-service communication
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: astra-services-allow
  namespace: astra
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: gateway-service
    - from:
        - podSelector:
            matchLabels:
              app: auth-service
    - from:
        - podSelector:
            matchLabels:
              app: routing-engine

---
# ConfigMap for environment-agnostic configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: astra-config
  namespace: astra
data:
  LOG_LEVEL: "info"
  ENVIRONMENT: "production"
  PROVIDERS_CHECK_INTERVAL: "60"

---
# Secrets for sensitive data
apiVersion: v1
kind: Secret
metadata:
  name: astra-secrets
  namespace: astra
type: Opaque
stringData:
  JWT_SECRET_KEY: "your-jwt-secret-key-change-this"
  DATABASE_URL: "postgresql://astra:password@postgres:5432/astra"
  REDIS_URL: "redis://redis:6379"
  OPENAI_API_KEY: "sk-xxxx"
  ANTHROPIC_API_KEY: "sk-ant-xxxx"

---
# PostgreSQL StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: astra
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: astra
            - name: POSTGRES_USER
              value: astra
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: astra-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U astra
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U astra
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
      volumes:
        - name: init-scripts
          configMap:
            name: postgres-init
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 50Gi

---
# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: astra
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432

---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: astra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          command:
            - redis-server
            - "--maxmemory"
            - "1gb"
            - "--maxmemory-policy"
            - "allkeys-lru"
            - "--save"
            - "900 1"
            - "--save"
            - "300 10"
            - "--save"
            - "60 10000"
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          emptyDir: {}

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: astra
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP

---
# Gateway Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: astra
  labels:
    app: gateway-service
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: gateway-service
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - gateway-service
                topologyKey: kubernetes.io/hostname
      containers:
        - name: gateway-service
          image: astra-gateway-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 9000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: GRPC_PORT
              value: "9000"
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: astra-config
                  key: ENVIRONMENT
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: astra-config
                  key: LOG_LEVEL
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: astra-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: astra-secrets
                  key: REDIS_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: astra-secrets
                  key: JWT_SECRET_KEY
            - name: AUTH_SERVICE_URL
              value: "grpc://auth-service:9000"
            - name: ROUTING_ENGINE_URL
              value: "grpc://routing-engine:9000"
            - name: GOVERNANCE_ENGINE_URL
              value: "grpc://governance-engine:9000"
            - name: OBSERVABILITY_SERVICE_URL
              value: "grpc://observability-service:9000"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      securityContext:
        fsGroup: 1000

---
# Gateway Service Service
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: astra
  labels:
    app: gateway-service
spec:
  type: LoadBalancer
  selector:
    app: gateway-service
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: grpc
      port: 9000
      targetPort: 9000
      protocol: TCP

---
# Gateway Service ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gateway-service
  namespace: astra

---
# Gateway Service Role
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gateway-service
  namespace: astra
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "watch", "list"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]

---
# Gateway Service RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gateway-service
  namespace: astra
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gateway-service
subjects:
  - kind: ServiceAccount
    name: gateway-service
    namespace: astra

---
# HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway-service-hpa
  namespace: astra
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gateway-service
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30

---
# PodDisruptionBudget for high availability
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gateway-service-pdb
  namespace: astra
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: gateway-service

---
# Ingress for external access
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: astra-gateway
  namespace: astra
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "10000"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.astragateway.io
      secretName: astra-gateway-tls
  rules:
    - host: api.astragateway.io
      http:
        paths:
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: gateway-service
                port:
                  number: 80

---
# ServiceMonitor for Prometheus
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: gateway-service
  namespace: astra
  labels:
    app: gateway-service
spec:
  selector:
    matchLabels:
      app: gateway-service
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics

---
# PrometheusRule for alerting
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: astra-gateway-alerts
  namespace: astra
spec:
  groups:
    - name: astra.gateway
      interval: 30s
      rules:
        - alert: GatewayHighErrorRate
          expr: |
            (sum(rate(gateway_requests_failed_total[5m])) / sum(rate(gateway_requests_total[5m]))) > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Gateway error rate above 5%"

        - alert: GatewayHighLatency
          expr: |
            histogram_quantile(0.95, gateway_request_duration_ms) > 1000
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Gateway P95 latency above 1000ms"

        - alert: ProviderDown
          expr: |
            provider_health_status == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Provider {{ $labels.provider }} is down"
