global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'gateway-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['gateway-service:8080']

  - job_name: 'auth-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['auth-service:8083']

  - job_name: 'routing-engine'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['routing-engine:8084']

  - job_name: 'governance-engine'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['governance-engine:8085']

  - job_name: 'observability-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['observability-service:8086']

  - job_name: 'a2a-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['a2a-service:8082']

  - job_name: 'mcp-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['mcp-service:8081']
